name: Activation or license support
description: Request help with GitMind Pro activation using sanitized details
title: "[Activation]: "
labels: ["activation-support"]
body:
  - type: markdown
    attributes:
      value: |
        **Do not post your license key, full order ID, purchase email, receipt, customer details, or screenshots containing them.**
        Public issues can only be used for sanitized triage. Maintainers will provide a private path when sensitive verification is required.
  - type: dropdown
    id: issue
    attributes:
      label: Issue type
      options:
        - License key activation
        - Order verification
        - Device slot or unavailable device
        - Deactivation
        - Status refresh or validation
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: GitMind, VS Code, and OS versions
    validations:
      required: true
  - type: textarea
    id: actions
    attributes:
      label: Actions already tried
      description: Include only sanitized error text.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I did not include a license key, full order ID, purchase email, receipt, or customer information.
          required: true
