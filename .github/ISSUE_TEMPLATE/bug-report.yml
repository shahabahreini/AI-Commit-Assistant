name: Bug report
description: Report reproducible GitMind behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, read the Wiki troubleshooting guide and search existing issues.
        **Never post API keys, license keys, full order IDs, purchase emails, source code, diffs, prompts, or private repository data.**
  - type: input
    id: version
    attributes:
      label: GitMind version
      placeholder: "5.0.0"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: VS Code version and operating system
      placeholder: "VS Code 1.xx, macOS/Windows/Linux"
    validations:
      required: true
  - type: input
    id: provider
    attributes:
      label: Provider and model
      description: Do not include credentials.
      placeholder: "Ollama / phi4"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Use a minimal sanitized example.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and sanitized diagnostics
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed credentials, customer information, source code, diffs, prompts, and private repository data.
          required: true
