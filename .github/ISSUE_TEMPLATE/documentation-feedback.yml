name: Documentation feedback
description: Report incorrect, missing, or unclear documentation
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: input
    id: page
    attributes:
      label: Page or section
      placeholder: "Wiki URL or README heading"
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is incorrect or unclear?
    validations:
      required: true
  - type: textarea
    id: correction
    attributes:
      label: Suggested correction
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed credentials, customer information, source code, and private repository data.
          required: true
