name: Provider or model request
description: Request new or updated AI provider/model support
title: "[Provider/Model]: "
labels: ["provider-request"]
body:
  - type: input
    id: provider
    attributes:
      label: Provider
      placeholder: "Provider name and public website"
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Model
      placeholder: "Public model ID"
    validations:
      required: true
  - type: textarea
    id: api
    attributes:
      label: Public API documentation
      description: Link to authentication, model-list, and generation API documentation. Do not include keys.
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: Use case
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I did not include credentials or private endpoint information.
          required: true
